{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="icon" type="image/x-icon" href="{% static 'tienda/img/faviconlogo.ico' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doces&Mecos - Formulario</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'tienda/css/Formulario.css' %}">
</head>

<body>
    <header class="cabecera">
        <div class="cabecera-left">
            <a href="{% url 'inicio' %}"><img src="{% static 'tienda/img/Logo.jpg' %}" alt="Logo" class="logo"></a>
        </div>
        <div class="cabecera-center">
            <h1>Doces&Mecos</h1>
            <p>Doce alegría en cada bocado!</p>
        </div>
        <div class="cabecera-right">
            <div class="hamburger-menu">
                <input type="checkbox" id="menu" class="menu-checkbox">
                <label for="menu" class="hamburger">
                    <i class="fa-solid fa-bars"></i>
                </label>
                <ul class="desplegable">
                    <li><a href="{% url 'inicio' %}">Inicio</a></li>
                    <li><a href="#">Noticias</a></li>
                    <li><a href="{% url 'productos' %}">Productos</a></li>
                    <li><a href="#">Contacta</a></li>
                </ul>
            </div>
            <div class="cabecera-icons">
                <a href="{% url 'carrito' %}" class="icon-link"><i class="fa-solid fa-cart-shopping"></i></a>
                <a href="{% url 'formulario' %}" class="icon-link"><i class="fa-solid fa-user"></i></a>
            </div>
        </div>
    </header>

    <main class="principal">
        <div class="form-principal">
            <div class="form-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2>Sign-In</h2>
            <form class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="nacionalidad">Nacionalidad</label>
                    <select id="nacionalidad" name="nacionalidad" required>
                        <option value="">Selecciona</option>
                        <option value="Español">Español</option>
                        <option value="Portugués">Portugués</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="apellidos">Apellidos</label>
                    <input type="text" id="apellidos" name="apellidos" required>
                </div>
                <div class="form-group">
                    <label for="localidad">Localidad</label>
                    <select id="localidad" name="localidad" required>
                        <option value="">Selecciona</option>
                        <option value="Mens">Mens</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>
                <div class="form-group">
                    <label for="codigo_postal">Código Postal</label>
                    <input type="text" id="codigo_postal" name="codigo_postal" required>
                </div>
                <button type="submit" class="enviar">Enviar</button>
            </form>
        </div>
    </main>

    <footer class="pie">
        <div class="pie-left">
            <img src="{% static 'tienda/img/Logo.jpg' %}" alt="Logo" class="logo">
            <p>Política e privacidade da empresa</p>
            <p>Rúa Eduardo Vila Fano 2</p>
            <p>Malpica de Bergantiños</p>
        </div>
        <div class="pie-right">
            <a href="https://www.instagram.com/doces_e_mecos/?hl=es">
                <p>@doces_e_mecos</p>
            </a>
            <p><a href="https://creativecommons.org/licenses/by-nc-nd/4.0/">
                    <font dir="auto" style="vertical-align: inherit;">
                        <font dir="auto" style="vertical-align: inherit;">CC BY-NC-ND 4.0</font>
                    </font>
                </a><img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt=""
                    style="max-width: 1em;max-height:1em;margin-left: .2em;"><img
                    src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt=""
                    style="max-width: 1em;max-height:1em;margin-left: .2em;"><img
                    src="https://mirrors.creativecommons.org/presskit/icons/nc.svg" alt=""
                    style="max-width: 1em;max-height:1em;margin-left: .2em;"><img
                    src="https://mirrors.creativecommons.org/presskit/icons/nd.svg" alt=""
                    style="max-width: 1em;max-height:1em;margin-left: .2em;"></p>
        </div>
    </footer>
</body>

</html>
